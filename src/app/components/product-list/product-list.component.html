<div class="products-container">
  <!-- ფილტრაციის პანელი -->
  <div class="filter-bar">
    <div class="filter-group">
      <input type="number" placeholder="მინ. ფასი" [(ngModel)]="filters.minPrice" (input)="applyFilters()">
      <input type="number" placeholder="მაქს. ფასი" [(ngModel)]="filters.maxPrice" (input)="applyFilters()">
    </div>

    <div class="filter-group">
      <select [(ngModel)]="filters.sort" (change)="applyFilters()">
        <option value="">დახარისხება</option>
        <option value="price_asc">ფასი: დაბლიდან</option>
        <option value="price_desc">ფასი: მაღლიდან</option>
        <option value="name_asc">სახელი: ა-ჰ</option>
      </select>
    </div>
  </div>

  <!-- პროდუქტების გრიდი (შენი ძველი კოდი) -->
  <div class="product-grid">
    <div class="product-card" *ngFor="let product of products">
      <!-- ბარათის კონტენტი -->
    </div>
  </div>
</div>
